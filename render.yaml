services:
  - type: web
    name: rulegpt-api
    env: python
    region: oregon
    plan: starter
    rootDir: rulegpt-api
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: ENVIRONMENT
        value: production
      - key: API_PREFIX
        value: /api
      - key: CORS_ORIGINS
        value: '["http://localhost:5173","https://www.tfrules.com","https://tfrules.com"]'
      - key: CORS_ORIGIN_REGEX
        value: ^https://([a-z0-9-]+\.)*vercel\.app$|^https://([a-z0-9-]+\.)?tfrules\.com$
      - key: RULEGPT_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: RULEGPT_FALLBACK_MODEL
        value: gpt-4.1
      - key: RULEGPT_CLASSIFIER_MODEL
        value: claude-haiku-4-5-20251001
      - key: RULEGPT_GENERATOR_MODEL
        value: claude-sonnet-4-6
      - key: RULEGPT_COMPLEX_MODEL
        value: claude-sonnet-4-6
      - key: RULHUB_API_URL
        value: https://api.rulhub.com
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_HTTP_REFERER
        sync: false
      - key: OPENROUTER_APP_TITLE
        value: RuleGPT
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ISSUER
        sync: false
      - key: SUPABASE_JWKS_URL
        sync: false
      - key: SUPABASE_JWT_AUDIENCE
        sync: false
      - key: RULHUB_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PRO_MONTHLY_PRICE_ID
        sync: false
      - key: STRIPE_PRO_ANNUAL_PRICE_ID
        sync: false
      - key: STRIPE_STARTER_MONTHLY_PRICE_ID
        sync: false
      - key: STRIPE_STARTER_ANNUAL_PRICE_ID
        sync: false
      - key: ADMIN_SECRET
        sync: false
