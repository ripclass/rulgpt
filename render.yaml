services:
  - type: web
    name: rulegpt-api
    env: python
    region: oregon
    plan: starter
    rootDir: rulegpt-api
    buildCommand: pip install -r requirements.txt
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: ENVIRONMENT
        value: production
      - key: API_PREFIX
        value: /api
      - key: CORS_ORIGINS
        value: '["http://localhost:5173","https://www.rulgpt.com","https://rulgpt.com","https://www.tfrules.com","https://tfrules.com"]'
      - key: CORS_ORIGIN_REGEX
        value: ^https://([a-z0-9-]+\.)*vercel\.app$|^https://([a-z0-9-]+\.)?rulgpt\.com$|^https://([a-z0-9-]+\.)?tfrules\.com$
      - key: RULEGPT_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: RULEGPT_FALLBACK_MODEL
        value: gpt-4.1
      - key: RULEGPT_CLASSIFIER_MODEL
        value: claude-haiku-4-5-20251001
      - key: RULEGPT_GENERATOR_MODEL
        value: claude-sonnet-4-6
      - key: RULEGPT_COMPLEX_MODEL
        value: claude-sonnet-4-6
      - key: RULGPT_LLM_MODEL
        value: z-ai/glm-5
      - key: RULGPT_LLM_FALLBACKS
        value: deepseek/deepseek-v4-pro,qwen/qwen3.7-plus
      - key: RULGPT_CLASSIFIER_LLM_MODEL
        value: z-ai/glm-4.7-flash
      - key: RULHUB_API_URL
        value: https://api.rulhub.com
      - key: RULHUB_API_VERSION
        value: "2026-04-28"
      # Deploy-time pin: RulHub API is suspended until 2026-07-05. Flip to
      # "rulhub" after the live smoke test (see LAUNCH-NOTES.md); code default
      # is already "rulhub".
      - key: RETRIEVAL_BACKEND
        value: local
      - key: RULGPT_RETRIEVAL_CACHE_TTL
        value: "1800"
      - key: RULGPT_RERANK_EMBEDDINGS
        value: "true"
      # Daily quota windows (Task 4.1).
      - key: ANONYMOUS_DAILY_LIMIT
        value: "2"
      - key: FREE_TIER_DAILY_LIMIT
        value: "5"
      # MT700 interpreter (Task 4.2) daily call caps.
      - key: MT700_DAILY_LIMIT_ANON
        value: "3"
      - key: MT700_DAILY_LIMIT_AUTH
        value: "10"
      - key: DATABASE_URL
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: OPENROUTER_API_KEY
        sync: false
      - key: OPENROUTER_BASE_URL
        value: https://openrouter.ai/api/v1
      - key: OPENROUTER_HTTP_REFERER
        sync: false
      - key: OPENROUTER_APP_TITLE
        value: RuleGPT
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_ANON_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_ISSUER
        sync: false
      - key: SUPABASE_JWKS_URL
        sync: false
      - key: SUPABASE_JWT_AUDIENCE
        sync: false
      - key: RULHUB_API_KEY
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_PROFESSIONAL_MONTHLY_PRICE_ID
        value: price_1TJQ0SBG8gnvAJXaWxLicmkA
      - key: STRIPE_PROFESSIONAL_ANNUAL_PRICE_ID
        value: price_1TJQ1IBG8gnvAJXaBTtfnuA6
      - key: STRIPE_ENTERPRISE_MONTHLY_PRICE_ID
        value: price_1TJQ1LBG8gnvAJXafcNqUOOv
      - key: STRIPE_ENTERPRISE_ANNUAL_PRICE_ID
        value: price_1TJQ1NBG8gnvAJXaZZlHHCmh
      # Pro $29/mo checkout SKU (Task 4.3) — marketing label only, maps to the
      # internal "professional" tier. Not yet created in Stripe.
      - key: STRIPE_PRO_MONTHLY_PRICE_ID
        sync: false
      # One-off artifact checkout prices (Task 4.4). Not yet created in Stripe.
      - key: STRIPE_CASE_NOTE_PRICE_ID
        sync: false
      - key: STRIPE_DRAFT_PRICE_ID
        sync: false
      - key: ADMIN_SECRET
        sync: false
