services:
  - type: web
    name: rulegpt-api
    env: python
    region: oregon
    plan: starter
    rootDir: rulegpt-api
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: API_PREFIX
        value: /api
      - key: CORS_ORIGINS
        value: '["http://localhost:5173","https://your-frontend.vercel.app"]'
      - key: PYTHON_VERSION
        value: 3.11.10
      - key: RULEGPT_EMBEDDING_MODEL
        value: text-embedding-3-small
      - key: RULEGPT_FALLBACK_MODEL
        value: gpt-4.1
      - key: RULEGPT_CLASSIFIER_MODEL
        value: claude-haiku-4-5-20251001
      - key: RULEGPT_GENERATOR_MODEL
        value: claude-sonnet-4-6
      - key: RULEGPT_COMPLEX_MODEL
        value: claude-sonnet-4-6
      - key: RULHUB_API_URL
        value: https://api.rulhub.com
