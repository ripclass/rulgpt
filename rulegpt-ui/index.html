<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary Meta -->
    <title>TFRules — Cited Trade Finance Rules. Not Opinion.</title>
    <meta name="description" content="Free citation engine for trade finance rules. Ask any question about UCP600, ISBP745, sanctions, FTAs, customs, and LC compliance — get a verified answer with exact rule references." />
    <link rel="canonical" href="https://www.tfrules.com/" />
    <!-- NOTE: index.html meta tags above are the homepage defaults. For every other route (/blog/*, /pricing, /faq, etc.) the build step `scripts/prerender.ts` overwrites these tags with per-route values at `dist/<route>/index.html`. Do NOT remove the above tags — the prerender uses them as a template to match against. -->


    <!-- Open Graph (LinkedIn, Facebook, Slack, iMessage) -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.tfrules.com/" />
    <meta property="og:title" content="TFRules — Cited Trade Finance Rules. Not Opinion." />
    <meta property="og:description" content="Trade finance rules have been locked behind paywalls for decades. Ask any question — get a cited, verifiable answer. Free." />
    <meta property="og:image" content="https://www.tfrules.com/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:site_name" content="TFRules" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="TFRules — Cited Trade Finance Rules. Not Opinion." />
    <meta name="twitter:description" content="Free citation engine for UCP600, ISBP745, sanctions, FTAs, customs, and LC compliance. Verified answers with exact rule references." />
    <meta name="twitter:image" content="https://www.tfrules.com/og-image.png" />

    <!-- Favicons -->
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />

    <!-- Theme -->
    <meta name="theme-color" content="#0A0A0A" />
    <meta name="color-scheme" content="dark light" />

    <!-- Additional SEO -->
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Enso Intelligence" />
    <meta name="keywords" content="trade finance, UCP600, ISBP745, letter of credit, LC compliance, sanctions screening, OFAC, FTA rules of origin, RCEP, CPTPP, trade documentation, ICC standards, Incoterms 2020, documentary credit, trade compliance" />

    <!-- Structured Data: WebSite + SearchAction -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "WebSite",
      "name": "TFRules",
      "alternateName": "TF Rules",
      "url": "https://www.tfrules.com",
      "description": "Free citation engine for trade finance rules. Verified answers from UCP600, ISBP745, sanctions, FTAs, customs, and ICC standards.",
      "publisher": {
        "@type": "Organization",
        "name": "Enso Intelligence",
        "url": "https://www.tfrules.com"
      }
    }
    </script>

    <!-- Structured Data: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "TFRules",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "url": "https://www.tfrules.com",
      "description": "Citation-first AI engine for trade finance compliance rules. Covers UCP600, ISBP745, ISP98, URDG758, Incoterms 2020, sanctions, FTAs, and customs regulations across 48+ jurisdictions.",
      "offers": [
        {
          "@type": "Offer",
          "name": "Free",
          "price": "0",
          "priceCurrency": "USD",
          "description": "5 queries per month with cited answers from 5,400+ rules"
        },
        {
          "@type": "Offer",
          "name": "Professional",
          "price": "79",
          "priceCurrency": "USD",
          "billingIncrement": "P1M",
          "description": "500 queries per month with deep analysis, sanctions expert-grade answers, and session history"
        },
        {
          "@type": "Offer",
          "name": "Enterprise",
          "price": "199",
          "priceCurrency": "USD",
          "billingIncrement": "P1M",
          "description": "2,000 queries per month with maximum depth on every query and dedicated support"
        }
      ]
    }
    </script>

    <!-- Structured Data: FAQPage (top questions for rich snippets) -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "Why not just ask a standard AI model about trade finance rules?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "General AI models hallucinate rule citations 58-88% of the time. TFRules grounds every answer in curated, versioned rules and provides exact article references — so you can cite UCP600 Art. 14(a), not a made-up paragraph."
          }
        },
        {
          "@type": "Question",
          "name": "What trade finance rules does TFRules cover?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "TFRules covers ICC standards (UCP600, ISBP745, ISP98, URDG758, Incoterms 2020), FTA rules of origin (RCEP, CPTPP, USMCA, AFCFTA), sanctions (OFAC, EU, UN), customs regulations, bank-specific LC requirements, SWIFT/ISO messaging standards, commodities compliance, and DOCDEX findings across 48+ jurisdictions."
          }
        },
        {
          "@type": "Question",
          "name": "Is TFRules free to use?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. TFRules offers 5 free queries per month with cited answers from 5,400+ rules and no account required. Professional plan is $79/month for 500 queries with deep analysis and sanctions expert-grade answers. Enterprise is $199/month for 2,000 queries."
          }
        }
      ]
    }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
