name: Backend CI

on:
  push:
    paths:
      - 'rulegpt-api/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    paths:
      - 'rulegpt-api/**'
  workflow_call:

defaults:
  run:
    working-directory: rulegpt-api

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/rulegpt_test
      ENVIRONMENT: development
      SECRET_KEY: ci-test-key
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: rulegpt_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'
          cache-dependency-path: rulegpt-api/requirements.txt
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run database migrations
        run: alembic upgrade head
      - name: Run tests
        run: python -m pytest -v --tb=short
