name: Frontend CI

on:
  push:
    paths:
      - 'rulegpt-ui/**'
      - '.github/workflows/frontend-ci.yml'
  pull_request:
    paths:
      - 'rulegpt-ui/**'
  workflow_call:

defaults:
  run:
    working-directory: rulegpt-ui

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: rulegpt-ui/package-lock.json
      - name: Install dependencies
        run: npm ci
      - name: Type check
        run: npm run type-check
      - name: Lint
        run: npm run lint
      - name: Test
        run: npm run test
